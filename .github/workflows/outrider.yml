name: Outrider

# Daily cron that uses remyxai/outrider to pick a paper from
# engine.remyx.ai for the VQASynth research interest and open a draft
# PR with a Claude-Code-scaffolded integration.
#
# Secrets needed (set in Settings → Secrets and variables → Actions):
#   REMYX_API_KEY     — engine.remyx.ai token
#   ANTHROPIC_API_KEY — Anthropic console token (for Claude Code)
#
# The workflow's built-in GITHUB_TOKEN handles PR / Issue creation on
# this repo — no PAT required since the action runs in the target.

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  recommend:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      REMYX_API_KEY: ${{ secrets.REMYX_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: remyxai/outrider@v1
        with:
          interest-id: 8c1de057-99fa-405f-a7af-7842492d2873
          # Daily-candidate evaluation: disable the per-repo rate-limit
          # window so the cron actually fires every day. With the default
          # 7-day floor, 6/7 daily runs would short-circuit at
          # skipped_rate_limit. Per-paper dedup (open PR or open Issue for
          # the same arxiv_id) still prevents duplicate work day-over-day.
          rate-limit-days: '0'
