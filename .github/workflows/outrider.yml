name: Outrider

# Daily cron that uses remyxai/outrider to pick a paper from
# engine.remyx.ai for this research interest and open a draft PR with a
# Claude-Code-scaffolded integration.
#
# Secrets needed (set in Settings → Secrets and variables → Actions):
#   REMYX_API_KEY     — engine.remyx.ai token
#   ANTHROPIC_API_KEY — model-provider token (e.g. Anthropic, for the agent)
#
# PRs / Issues are authored by the Remyx GitHub App (remyx-ai[bot]) via a
# minted installation token; if that can't be minted the action falls back
# to the workflow's built-in GITHUB_TOKEN.

on:
  schedule:
    # Daily at 14:00 UTC
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  recommend:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      REMYX_API_KEY: ${{ secrets.REMYX_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      # Mint a remyx-ai[bot] token from Remyx so the PR / Issue is authored
      # by the Remyx GitHub App (not github-actions[bot]). The App private
      # key stays on Remyx's side; this uses the REMYX_API_KEY already in
      # secrets. If it can't be minted (e.g. App not installed), the token
      # is empty and the action falls back to the built-in GITHUB_TOKEN.
      - name: Mint Remyx bot token
        id: remyx-bot
        shell: bash
        run: |
          token="$(curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.REMYX_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"repo\": \"${{ github.repository }}\"}" \
            "https://engine.remyx.ai/api/v1.0/github/installation-token" \
            | python3 -c "import sys, json; print(json.load(sys.stdin).get('token', ''))")" || token=""
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"
      - uses: remyxai/outrider@v1
        with:
          interest-id: 8c1de057-99fa-405f-a7af-7842492d2873
          # remyx-ai[bot] token (empty → action falls back to GITHUB_TOKEN).
          github-token: ${{ steps.remyx-bot.outputs.token }}
          # Disable the per-repo rate-limit window so manual and scheduled
          # runs always evaluate the latest recommendation. Per-paper dedup
          # (open PR / Issue for the same arxiv_id) still prevents duplicates.
          rate-limit-days: '0'
