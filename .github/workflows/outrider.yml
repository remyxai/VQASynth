name: Outrider

on:
  # Continuous-mode cron disabled — rotated to atropos.
  # Session totals: 5 natural cron runs = 3 rejected_path_violations (all on
  # '.gitignore') + 2 skipped_by_selection_verification. Pinned dispatch of
  # 2607.06553v1 confirmed pin-arxiv breaks the re-pick loop but terminated
  # at preflight (mechanism mismatch), so the .gitignore allowlist patch
  # (ccdc94d) remains untested end-to-end. Workflow kept in continuous shape
  # so future re-enable is a one-line uncomment.
  # schedule:
  #   - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      provider:
        description: 'Which model provider to route Claude Code at.'
        type: choice
        required: false
        default: 'zai'
        options:
          - anthropic
          - zai
      model:
        description: 'Specific model name (empty = provider default).'
        required: false
        default: ''
      search-method:
        description: 'Optional method query — top hit of an engine search overrides the ranker pool.'
        required: false
        default: ''
      pin-arxiv:
        description: 'Optional arxiv_id to implement directly (bypasses selection).'
        required: false
        default: ''
      publish:
        description: 'pr or branch (default). branch mode pushes without opening PR/Issue — cheap continuous-mode default.'
        required: false
        default: 'branch'
      claude-timeout:
        description: 'Wall-clock seconds for the Claude Code agent calls.'
        required: false
        default: '900'
      lead-content:
        description: 'Optional hand-crafted implementation spec (landing-zone-to-PR mode). Overrides suggested_experiment.'
        required: false
        default: ''
      start-from-ref:
        description: 'Optional branch/tag/SHA to start the coding session from.'
        required: false
        default: ''
      staged-synthesis:
        description: 'When true, run the research phase to enrich the coding session with HF Hub linkage + sibling impls.'
        required: false
        default: 'false'
      maintain-state:
        description: 'When true, read + write .remyx/repo_intel.yaml on the fork to accumulate cross-run learning.'
        required: false
        default: 'true'

concurrency:
  group: outrider-${{ github.repository }}
  cancel-in-progress: false

jobs:
  recommend:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      REMYX_API_KEY: ${{ secrets.REMYX_API_KEY }}
    steps:
      - name: Configure provider auth
        shell: bash
        env:
          ANTHROPIC_API_KEY_SECRET: ${{ secrets.ANTHROPIC_API_KEY }}
          ZAI_API_KEY_SECRET: ${{ secrets.ZAI_API_KEY }}
          MODEL_INPUT: ${{ inputs.model || '' }}
          PROVIDER: ${{ inputs.provider || 'zai' }}
        run: |
          if [ "$PROVIDER" = "zai" ]; then
            echo "ANTHROPIC_AUTH_TOKEN=$ZAI_API_KEY_SECRET" >> "$GITHUB_ENV"
          else
            echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY_SECRET" >> "$GITHUB_ENV"
          fi
          if [ -n "$MODEL_INPUT" ]; then
            echo "ANTHROPIC_MODEL=$MODEL_INPUT" >> "$GITHUB_ENV"
          fi
      - uses: remyxai/outrider@v1
        with:
          interest-id: 8c1de057-99fa-405f-a7af-7842492d2873
          rate-limit-days: '0'
          # Coding agents routinely touch build/env metadata while adding a
          # training pipeline (cache dirs into .gitignore, deps into
          # requirements). Outrider's default allowlist misses these, so
          # three consecutive dispatches were rejected on '.gitignore not in
          # allowlist'. Extend the allowlist to cover common meta-files.
          guardrails-allowlist: '.gitignore,.dockerignore,requirements*.txt,setup.py,setup.cfg,pyproject.toml,MANIFEST.in'
          search-method: ${{ inputs.search-method || '' }}
          pin-arxiv: ${{ inputs.pin-arxiv || '' }}
          claude-timeout: ${{ inputs.claude-timeout || '900' }}
          lead-content: ${{ inputs.lead-content || '' }}
          start-from-ref: ${{ inputs.start-from-ref || '' }}
          publish: ${{ inputs.publish || 'branch' }}
          staged-synthesis: ${{ inputs.staged-synthesis || 'false' }}
          maintain-state: ${{ inputs.maintain-state || 'true' }}
          model-base-url: ${{ (inputs.provider || 'zai') == 'zai' && 'https://api.z.ai/api/anthropic' || '' }}
