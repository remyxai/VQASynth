version: '3.8'

# Standalone eval pipeline. Runs a HuggingFace VLM against spatial reasoning
# benchmarks (SpatialScore, OmniSpatial, SpaCE-10, MindCube) and produces a
# per-benchmark accuracy report.
#
# This is a post-training step. It does not depend on the synthesis pipeline
# (spatialvqa.yaml / spatialvqa_reasoning.yaml). The intended workflow is:
#   1. Build a dataset with the synthesis pipeline.
#   2. Fine-tune a VLM on that dataset.
#   3. Run this compose file with the trained model's HuggingFace slug set in
#      arguments.eval_model in config.yaml.
#
# Usage:
#   docker compose -f spatialvqa_eval.yaml up --build

services:
  eval_stage:
    build:
      context: ../
      dockerfile: docker/eval_stage/Dockerfile
    volumes:
      - ${OUTPUT_DIR}:${OUTPUT_DIR}
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      HF_TOKEN: ${HF_TOKEN}
    deploy:
      resources:
        reservations:
          devices:
          - capabilities: ["gpu"]
